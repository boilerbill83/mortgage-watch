name: Daily Mortgage Rate SMS

on:
  schedule:
    # 9:00 AM Chicago Friday (CDT/summer = UTC-5 = 14:00 UTC)
    # Change to '0 15 * * 5' Nov-Mar when Chicago switches to CST (UTC-6)
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  send-rates:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch rates, update history, send SMS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: node scripts/fetch-and-notify.js

      - name: Commit updated rate history
        run: |
          git config user.name "mortgage-watch-bot"
          git config user.email "bot@mortgage-watch"
          git add data/history.json
          git diff --staged --quiet || git commit -m "chore: rate history $(date +%Y-%m-%d)"
          git push
